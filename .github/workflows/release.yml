name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run compile

      - name: Package VSIX
        run: npx @vscode/vsce package --allow-missing-repository --out "hpc-sync-${GITHUB_REF_NAME#v}.vsix"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: hpc-sync-*.vsix
          generate_release_notes: true
